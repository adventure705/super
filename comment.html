<!DOCTYPE html>
<html lang="ko" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 댓글 심층 분석기 (Pro - Cloud Sync)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { bg: '#121212', card: '#1E1E1E', border: '#333333', text: '#E0E0E0', muted: '#A0A0A0' },
                        brand: { red: '#FF4E45', blue: '#3B82F6', green: '#10B981' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #121212;
            color: #E0E0E0;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #121212;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .loader {
            border: 3px solid #333;
            border-top: 3px solid #FF4E45;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .markdown-raw {
            white-space: pre-wrap;
            line-height: 1.6;
            font-family: 'Menlo', 'Monaco', monospace;
            font-size: 0.85em;
            background-color: #000;
            color: #4ade80;
            padding: 1.5rem;
            border-radius: 0.5rem;
            border: 1px solid #333;
            overflow-x: auto;
        }

        .highlight-text strong {
            color: #FF4E45;
            background-color: rgba(255, 78, 69, 0.1);
            padding: 0 4px;
            border-radius: 2px;
            font-weight: 700;
        }

        .hover-card {
            transition: all 0.2s ease;
        }

        .hover-card:hover {
            transform: translateY(-2px);
            border-color: #FF4E45;
        }

        .custom-checkbox {
            appearance: none;
            background-color: #333;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.15em;
            height: 1.15em;
            border: 0.1em solid #555;
            border-radius: 0.15em;
            display: grid;
            place-content: center;
            cursor: pointer;
        }

        .custom-checkbox::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .custom-checkbox:checked {
            background-color: #FF4E45;
            border-color: #FF4E45;
        }

        .custom-checkbox:checked::before {
            transform: scale(1);
        }

        .type-badge {
            padding: 4px 12px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .type-trend {
            background-color: rgba(255, 78, 69, 0.15);
            color: #FF4E45;
            border: 1px solid rgba(255, 78, 69, 0.3);
        }

        .type-evergreen {
            background-color: rgba(16, 185, 129, 0.15);
            color: #34D399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .type-seasonal {
            background-color: rgba(251, 191, 36, 0.15);
            color: #FBBF24;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .comment-quote {
            background-color: #252525;
            border-left: 3px solid #555;
            padding: 10px 14px;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #ccc;
            border-radius: 0 6px 6px 0;
        }

        .comment-author {
            font-size: 0.75rem;
            font-weight: 700;
            color: #888;
            margin-bottom: 4px;
            display: block;
        }

        .comment-table th {
            background-color: #252525;
            color: #bbb;
            font-weight: 600;
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        .comment-table td {
            padding: 1rem;
            border-bottom: 1px solid #333;
            color: #ddd;
            vertical-align: top;
        }

        .comment-table tr:hover td {
            background-color: #2a2a2a;
        }

        .history-table th {
            background-color: #252525;
            color: #9ca3af;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 1rem;
            text-align: left;
            white-space: nowrap;
            user-select: none;
        }

        .history-table td {
            padding: 1rem;
            border-top: 1px solid #333;
            vertical-align: middle;
            color: #e5e7eb;
        }

        .history-table tr:hover {
            background-color: #1a1a1a;
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1E1E1E inset !important;
            -webkit-text-fill-color: white !important;
        }

        #scrollTopBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #scrollTopBtn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* Modal Styles */
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .modal-bg.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #1E1E1E;
            border: 1px solid #333;
            border-radius: 1rem;
            width: 95%;
            max-width: 900px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            transform: scale(0.95);
            transition: transform 0.2s;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
        }

        .modal-bg.active .modal-content {
            transform: scale(1);
        }
    </style>
</head>

<body class="min-h-screen relative">

    <button id="scrollTopBtn" onclick="window.scrollTo(0,0)"
        class="bg-brand-red text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center hover:bg-red-600 transition">
        <i class="fas fa-arrow-up"></i>
    </button>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-2 flex justify-center items-center gap-3">
                <i class="fab fa-youtube text-brand-red"></i>
                <span>YOUTUBE <span class="text-brand-red">INSIGHT PRO</span></span>
            </h1>
            <p class="text-dark-muted text-sm md:text-base">심층 논쟁 분석 · 다국어 자동 번역 · 클라우드 동기화</p>
        </header>

        <!-- API Settings Header -->
        <div
            class="bg-dark-card rounded-xl p-4 mb-8 border border-dark-border shadow-lg flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-brand-blue/10 flex items-center justify-center text-brand-blue">
                    <i class="fas fa-cloud"></i>
                </div>
                <div>
                    <h2 class="text-sm font-bold text-white">API 설정 및 동기화</h2>
                    <p class="text-xs text-dark-muted" id="activeKeyLabel">연동 대기 중...</p>
                </div>
            </div>
            <button onclick="openApiModal()"
                class="bg-[#333] hover:bg-[#444] text-white px-4 py-2 rounded-lg text-xs font-bold transition border border-dark-border flex items-center gap-2">
                <i class="fas fa-cog"></i> 키 관리
            </button>
        </div>

        <div class="bg-dark-card rounded-xl border border-dark-border shadow-lg overflow-hidden min-h-[500px]">
            <div class="flex border-b border-dark-border">
                <button onclick="setMode('link')" id="tab-link"
                    class="flex-1 py-4 text-center font-bold text-sm md:text-base transition-colors border-b-2 border-brand-red text-brand-red bg-[#252525]"><i
                        class="fas fa-link mr-2"></i>영상 링크 분석</button>
                <button onclick="setMode('channel')" id="tab-channel"
                    class="flex-1 py-4 text-center font-bold text-sm md:text-base text-dark-muted hover:text-white transition-colors border-b-2 border-transparent hover:bg-[#252525]"><i
                        class="fas fa-tv mr-2"></i>채널 인기 영상</button>
                <button onclick="setMode('history')" id="tab-history"
                    class="flex-1 py-4 text-center font-bold text-sm md:text-base text-dark-muted hover:text-white transition-colors border-b-2 border-transparent hover:bg-[#252525]"><i
                        class="fas fa-history mr-2"></i>클라우드 히스토리</button>
            </div>

            <div class="p-6 md:p-8">
                <div id="view-link" class="block">
                    <div class="flex flex-col md:flex-row gap-3 mb-8">
                        <input type="text" id="videoUrl"
                            class="flex-1 bg-[#121212] border border-dark-border text-white p-3 rounded-lg focus:ring-2 focus:ring-brand-red outline-none"
                            placeholder="https://youtu.be/...">
                        <button onclick="analyzeSingleVideo()"
                            class="bg-brand-red hover:bg-red-600 text-white px-8 py-3 rounded-lg font-bold transition shadow-lg shadow-red-900/20">분석하기</button>
                    </div>
                </div>

                <div id="view-channel" class="hidden">
                    <div class="flex flex-col md:flex-row gap-3 mb-6">
                        <input type="text" id="channelHandle"
                            class="flex-1 bg-[#121212] border border-dark-border text-white p-3 rounded-lg focus:ring-2 focus:ring-brand-red outline-none"
                            placeholder="채널 URL, @핸들, 또는 채널명">
                        <button onclick="searchChannelVideos()"
                            class="bg-[#333] hover:bg-[#444] text-white px-8 py-3 rounded-lg font-bold transition border border-dark-border">조회하기</button>
                    </div>
                    <div id="channelControls"
                        class="hidden mb-6 p-4 bg-[#252525] rounded-lg border border-dark-border flex flex-wrap gap-4 items-center justify-between">
                        <div class="flex gap-2 items-center flex-wrap">
                            <span class="text-xs font-bold text-dark-muted uppercase mr-1">정렬:</span>
                            <select id="sortOption" onchange="sortChannelVideos()"
                                class="bg-[#121212] text-white text-sm p-2 rounded border border-dark-border outline-none focus:border-brand-red">
                                <option value="viewCount">조회수</option>
                                <option value="likeCount">좋아요</option>
                                <option value="commentCount">댓글수</option>
                                <option value="date">날짜</option>
                            </select>
                            <select id="orderOption" onchange="sortChannelVideos()"
                                class="bg-[#121212] text-white text-sm p-2 rounded border border-dark-border outline-none focus:border-brand-red">
                                <option value="desc">내림차순 (높은순)</option>
                                <option value="asc">오름차순 (낮은순)</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-3">
                            <span id="selectedCount" class="text-sm text-brand-blue font-bold">0개 선택됨</span>
                            <button onclick="analyzeSelectedVideos()"
                                class="bg-brand-blue hover:bg-blue-600 text-white px-4 py-2 rounded text-sm font-bold transition shadow-lg shadow-blue-900/20 disabled:opacity-50 disabled:cursor-not-allowed"
                                id="btnBatchAnalyze" disabled><i class="fas fa-magic mr-1"></i> 선택 영상 일괄 분석</button>
                        </div>
                    </div>
                    <div id="videoGrid"
                        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 mb-6"></div>
                    <div id="loadMoreContainer" class="hidden text-center mt-8">
                        <button onclick="loadMoreChannelVideos()"
                            class="bg-[#333] hover:bg-[#444] text-white px-6 py-3 rounded-full font-bold text-sm transition border border-dark-border shadow-lg"><i
                                class="fas fa-plus mr-2"></i> 영상 더 불러오기</button>
                    </div>
                </div>

                <div id="view-history" class="hidden">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                        <h3 class="text-white font-bold text-lg flex items-center gap-2"><i
                                class="fas fa-list text-brand-blue"></i> 분석 기록 (Cloud)</h3>
                        <div class="flex gap-3 w-full md:w-auto items-center">
                            <div class="relative flex-1 md:w-64">
                                <i
                                    class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-dark-muted"></i>
                                <input type="text" id="historySearch" oninput="filterHistory()" placeholder="기록 검색"
                                    class="w-full bg-[#121212] border border-dark-border text-white pl-9 p-2 rounded text-sm focus:border-brand-blue outline-none">
                            </div>
                            <button onclick="downloadSelectedHistory()"
                                class="bg-brand-blue hover:bg-blue-600 text-white px-4 py-2 rounded text-xs font-bold transition whitespace-nowrap disabled:opacity-50"
                                id="btnHistoryBatchDown" disabled><i class="fas fa-download mr-1"></i> 선택 다운로드</button>
                            <button onclick="clearAllHistory()"
                                class="text-xs text-red-400 hover:text-red-300 underline whitespace-nowrap">전체
                                삭제</button>
                        </div>
                    </div>
                    <div id="historyLoading" class="text-center py-8 text-dark-muted hidden">
                        <div class="loader mb-2 w-6 h-6"></div> 기록 불러오는 중...
                    </div>
                    <div id="historyContainer" class="overflow-x-auto rounded-lg border border-dark-border"></div>
                    <div id="noHistoryMsg" class="text-center text-dark-muted py-10 hidden">저장된 분석 기록이 없습니다.</div>
                </div>

                <!-- mt-12 Added for spacing -->
                <div id="resultArea" class="hidden animate-fade-in mt-12 border-t border-dark-border pt-12">
                    <div id="statsDashboard" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>
                    <div id="loading" class="hidden py-12 text-center">
                        <div class="loader mb-4"></div>
                        <p class="text-dark-muted animate-pulse" id="loadingText">데이터 수집 중...</p>
                    </div>
                    <div id="webReport" class="hidden space-y-8">
                        <div
                            class="bg-gradient-to-r from-blue-900/20 to-transparent border-l-4 border-brand-blue p-5 rounded-r-lg">
                            <h4 class="font-bold text-brand-blue mb-3 text-lg">📝 상세 요약</h4>
                            <p id="ui-summary" class="text-gray-300 leading-relaxed highlight-text"></p>
                        </div>
                        <div id="dynamicReportContent"></div>
                    </div>
                    <!-- Raw Data Section Removed as requested -->
                </div>
            </div>
        </div>
    </div>

    <!-- API Settings Modal (Separate Management) -->
    <div id="apiModal" class="modal-bg">
        <div class="modal-content overflow-hidden flex flex-col h-[90vh]">
            <div class="p-4 border-b border-dark-border flex justify-between items-center bg-[#252525]">
                <h3 class="font-bold text-white flex items-center gap-2"><i class="fas fa-key text-brand-blue"></i> API
                    키 관리 (개별 설정)</h3>
                <button onclick="closeApiModal()" class="text-gray-400 hover:text-white transition"><i
                        class="fas fa-times"></i></button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 gap-6 bg-[#181818]">

                <!-- YouTube API Section -->
                <div class="bg-[#121212] rounded-xl border border-dark-border p-4 flex flex-col">
                    <h4 class="font-bold text-white mb-4 flex items-center gap-2 text-lg"><i
                            class="fab fa-youtube text-brand-red"></i> YouTube API</h4>

                    <div class="bg-[#1E1E1E] p-3 rounded-lg border border-dark-border mb-4 space-y-2">
                        <input type="hidden" id="editId_yt">
                        <input type="text" id="alias_yt"
                            class="w-full bg-[#121212] border border-dark-border text-white p-2 rounded text-sm focus:border-brand-red outline-none"
                            placeholder="별칭 (예: 메인 유튜브키)">
                        <input type="password" id="key_yt"
                            class="w-full bg-[#121212] border border-dark-border text-white p-2 rounded text-sm focus:border-brand-red outline-none"
                            placeholder="YouTube API Key" onkeydown="if(event.key === 'Enter') saveKey('yt')">
                        <button onclick="saveKey('yt')" id="btnSave_yt"
                            class="w-full bg-brand-red hover:bg-red-600 text-white p-2 rounded font-bold text-sm transition">추가하기</button>
                    </div>

                    <div class="flex-1 overflow-y-auto min-h-[150px]">
                        <div id="list_yt" class="space-y-2">
                            <div class="text-center text-gray-600 text-xs py-4">키가 없습니다.</div>
                        </div>
                    </div>
                </div>

                <!-- Gemini API Section -->
                <div class="bg-[#121212] rounded-xl border border-dark-border p-4 flex flex-col">
                    <h4 class="font-bold text-white mb-4 flex items-center gap-2 text-lg"><i
                            class="fas fa-star text-brand-blue"></i> Gemini API</h4>

                    <div class="bg-[#1E1E1E] p-3 rounded-lg border border-dark-border mb-4 space-y-2">
                        <input type="hidden" id="editId_gemini">
                        <input type="text" id="alias_gemini"
                            class="w-full bg-[#121212] border border-dark-border text-white p-2 rounded text-sm focus:border-brand-blue outline-none"
                            placeholder="별칭 (예: 제미나이 프로)">
                        <input type="password" id="key_gemini"
                            class="w-full bg-[#121212] border border-dark-border text-white p-2 rounded text-sm focus:border-brand-blue outline-none"
                            placeholder="Gemini API Key" onkeydown="if(event.key === 'Enter') saveKey('gemini')">
                        <button onclick="saveKey('gemini')" id="btnSave_gemini"
                            class="w-full bg-brand-blue hover:bg-blue-600 text-white p-2 rounded font-bold text-sm transition">추가하기</button>
                    </div>

                    <div class="flex-1 overflow-y-auto min-h-[150px]">
                        <div id="list_gemini" class="space-y-2">
                            <div class="text-center text-gray-600 text-xs py-4">키가 없습니다.</div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="p-4 border-t border-dark-border bg-[#252525] text-right">
                <button onclick="closeApiModal()"
                    class="bg-[#444] hover:bg-[#555] text-white px-6 py-2 rounded-lg text-sm font-bold transition">닫기</button>
            </div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // === [중요] UI 함수를 먼저 전역에 등록하여 스크립트 에러 발생 시에도 버튼이 반응하도록 함 ===

        window.setMode = (mode) => {
            ['link', 'channel', 'history'].forEach(t => {
                const view = document.getElementById(`view-${t}`);
                const tab = document.getElementById(`tab-${t}`);
                if (t === mode) {
                    view.classList.remove('hidden');
                    tab.className = "flex-1 py-4 text-center font-bold text-sm md:text-base transition-colors border-b-2 border-brand-red text-brand-red bg-[#252525]";
                } else {
                    view.classList.add('hidden');
                    tab.className = "flex-1 py-4 text-center font-bold text-sm md:text-base transition-colors text-dark-muted hover:text-white border-b-2 border-transparent hover:bg-[#252525]";
                }
            });
            if (mode === 'history') {
                if (typeof window.filterHistory === 'function') window.filterHistory();
                else console.warn("filterHistory function is not loaded yet.");
            }
        };

        window.openApiModal = () => document.getElementById('apiModal').classList.add('active');
        window.closeApiModal = () => document.getElementById('apiModal').classList.remove('active');

        // 전역 변수 설정
        let app, auth, db, appId;

        // === Firebase 초기화 및 앱 실행 ===
        (async function initializeSystem() {
            let firebaseConfig = null;

            try {
                // 1. Canvas 환경 변수 확인
                if (typeof __firebase_config !== 'undefined') {
                    firebaseConfig = JSON.parse(__firebase_config);
                    appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                }
                // 2. 외부 환경(GitHub/Local): firebase-config.json 파일 로드 시도 (이름 변경 반영)
                else {
                    console.log("Detecting external environment. Looking for firebase-config.json...");
                    try {
                        const response = await fetch('./firebase-config.json');
                        if (response.ok) {
                            const configData = await response.json();
                            firebaseConfig = configData.config || configData;
                            appId = configData.appId || 'github-web-app';
                            console.log("Config loaded from file.");
                        } else {
                            console.warn("firebase-config.json not found.");
                        }
                    } catch (e) {
                        console.warn("Failed to fetch config json:", e);
                    }
                }

                if (!firebaseConfig) {
                    console.error("Firebase Configuration is missing.");
                    const labelEl = document.getElementById('activeKeyLabel');

        function formatNumber(num) { return new Intl.NumberFormat('ko-KR').format(num); }
        function formatDate(isoString) { return new Date(isoString).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' }); }
        function timeSince(isoString) {
            const seconds = Math.floor((new Date() - new Date(isoString)) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + "년 전";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + "개월 전";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "일 전";
            return "방금 전";
        }
        function parseBold(text) { return text ? text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') : ""; }
        function sanitizeFilename(str) { return str.replace(/[\\/:*?"<>|]/g, "").replace(/\s+/g, "_"); }

        function getFormattedDate(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}${m}${d}`;
        }

        function getReportFilename(videoInfo, analysisTs) {
            const analysisDate = getFormattedDate(new Date(analysisTs || Date.now()));
            const downloadDate = getFormattedDate(new Date());
            const safeChannel = sanitizeFilename(videoInfo.channelTitle);
            const safeTitle = sanitizeFilename(videoInfo.title);
            return `${safeChannel}_${safeTitle}_${analysisDate}_${downloadDate}.txt`;
        }

        function parseChannelInput(input) {
            if (!input) return "";
            if (input.includes('youtube.com/')) {
                const idMatch = input.match(/\/channel\/([^/?]+)/);
                if (idMatch) return idMatch[1];
                const handleMatch = input.match(/\/@([^/?]+)/);
                if (handleMatch) return handleMatch[1];
                const userMatch = input.match(/\/user\/([^/?]+)/);
                if (userMatch) return userMatch[1];
                const customMatch = input.match(/\/c\/([^/?]+)/);
                if (customMatch) return customMatch[1];
            }
            if (input.startsWith('@')) return input.substring(1);
            return input;
        }

        // Sort Helper Function
        window.sortHistory = function (key) {
            if (historySortState.key === key) {
                // Toggle order
                historySortState.order = historySortState.order === 'asc' ? 'desc' : 'asc';
            } else {
                // New key, default to desc
                historySortState.key = key;
                historySortState.order = 'desc';
            }
            window.filterHistory(); // Re-filter and sort
        };

        window.filterHistory = async function () {
            const history = await window.fetchCloudHistory();
            const query = document.getElementById('historySearch').value.toLowerCase();
            let keys = Object.keys(history);

            // 1. Filter
            keys = keys.filter(k => {
                const item = history[k];
                if (!item || !item.video) return false;
                return item.video.title.toLowerCase().includes(query) ||
                    item.video.channelTitle.toLowerCase().includes(query);
            });

            // 2. Sort
            keys.sort((a, b) => {
                const itemA = history[a];
                const itemB = history[b];

                let valA, valB;

                switch (historySortState.key) {
                    case 'title':
                        valA = itemA.video.title;
                        valB = itemB.video.title;
                        return historySortState.order === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                    case 'viewCount':
                        valA = parseInt(itemA.video.viewCount || 0);
                        valB = parseInt(itemB.video.viewCount || 0);
                        break;
                    case 'publishedAt':
                        valA = new Date(itemA.video.publishedAt).getTime();
                        valB = new Date(itemB.video.publishedAt).getTime();
                        break;
                    case 'timestamp':
                    default:
                        valA = itemA.timestamp;
                        valB = itemB.timestamp;
                        break;
                }

                if (valA < valB) return historySortState.order === 'asc' ? -1 : 1;
                if (valA > valB) return historySortState.order === 'asc' ? 1 : -1;
                return 0;
            });

            currentHistoryKeys = keys;
            renderHistoryTable(keys, history);
        }

            let html = `

                            </th>
                            <th class="text-right">관리</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            keys.forEach(id => {
                const item = history[id];
                const isSelected = selectedHistoryIds.has(id);
                if (!item || !item.video) return;

                const filename = getReportFilename(item.video, item.timestamp);

                html += `
                    <tr class="cursor-pointer transition-colors ${isSelected ? 'bg-white/5' : ''}" onclick="loadSavedAnalysis('${id}')">

            const url = document.getElementById('videoUrl').value;
            const id = extractVideoId(url);
            if (!id) return alert("올바른 유튜브 링크가 아닙니다.");

        window.runAnalysis = async function (id, k) {
            if (progressInterval) clearInterval(progressInterval);

            showLoading("데이터 수집 시작...");
            updateLoadingText(5, "데이터 수집 시작...");

            try {
                const video = await window.fetchVideoDetails(id, k.ytKey);
                updateLoadingText(20, "영상 정보 수집 완료");
                const comments = await window.fetchComments(id, k.ytKey);
                updateLoadingText(40, "댓글 데이터 수집 완료");

                if (!video || !comments) throw new Error("데이터 수집 실패. API 키나 영상 상태를 확인하세요.");

                window.renderStats(video);

                let currentP = 40;
                progressInterval = setInterval(() => {
                    if (currentP < 95) {
                        currentP += Math.floor(Math.random() * 3) + 1;
                        updateLoadingText(currentP, "AI 심층 분석 및 번역 진행 중...");
                    }
                }, 500);

                const data = await window.analyzeWithGemini(video, comments, k.geminiKey);

                clearInterval(progressInterval);
                updateLoadingText(100, "분석 완료!");

                currentVideoInfo = video;
                currentVideoId = id;
                const ts = await window.saveAnalysis(id, video, data);
                currentAnalysisTimestamp = ts;

                setTimeout(() => {
                    hideLoading();
                    window.renderWebUI(data, id);
                    const md = window.generateMarkdown(data, video);
                    currentMarkdownText = md;
                    // Raw Data rendering removed as requested
                    document.getElementById('webReport').scrollIntoView({ behavior: 'smooth' });
                }, 500);

            } catch (e) {
                hideLoading();
                alert(e.message);
            }
        }

        window.analyzeWithGemini = async function (videoData, comments, apiKey) {
            const genAI = new GoogleGenerativeAI(apiKey);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash", generationConfig: { responseMimeType: "application/json" } });

            const prompt = `
            너는 유튜브 데이터 및 여론 분석 전문가야. 아래 영상 정보와 댓글을 분석하여 JSON 형식으로 답해줘.
            
            **[중요 지침]**
            1. **다국어 번역**: 만약 영상 제목, 설명, 댓글이 한국어가 아닌 경우(영어, 일본어 등), **모든 분석 결과(요약, 논쟁 내용, 심리 분석 등)를 자연스러운 한국어로 번역해서** 작성해줘.
            2. **강조 표시**: 중요한 문장이나 핵심 키워드는 반드시 markdown bold(**텍스트**)처리를 해줘.

            **[영상 정보]**
            * 제목: ${videoData.title}
            * 채널: ${videoData.channelTitle}
            * 게시일: ${videoData.publishedAt}
            * 조회수: ${formatNumber(videoData.viewCount)}
            * 좋아요: ${formatNumber(videoData.likeCount)}
            * 댓글수: ${formatNumber(videoData.commentCount)}
            * 설명: ${videoData.description ? videoData.description.substring(0, 500) : '없음'}
            
            **[댓글 데이터]**
            ${comments.substring(0, 40000)}

            **[분석 요청 사항 (JSON Key)]**
            1. summary: 전체 요약 (3~4문장). **핵심은 볼드체**로. (외국어일 경우 한국어로 번역 필수)
            
            2. viral_analysis:
               - growth_trend: 조회수와 게시기간을 고려한 현재 성장세 분석 (수치 포함하여 설명).
               - engagement_rate: 좋아요/댓글 비율 등을 고려한 시청자 참여도(Engagement) 분석.
               - subject_characteristics: 주제 특성상 왜 바이럴이 되었는지, 알고리즘 이점 분석.

            3. content_type_analysis:
               - type: "Trend", "Seasonal", "Evergreen" 중 하나.
               - reason: 분류 근거.
               - evergreen_type: (에버그린 시) "Educational", "Listicle", "Glossary", "CaseStudy" 등.
               - maintenance: "Static" or "Sustainable".
               - strategy: 에버그린 전략 조언. **핵심은 볼드체**로.
               - seo_keywords: SEO 키워드 배열 (5개).

            4. controversy_deep_analysis: 
               댓글 의견을 **찬성(영상 옹호/동의)**, **반대(영상 비판/반박)**, **중립(제3의 시각/절충)**으로 나누어 분석.
               - pros: { title: "찬성측 주요 논리(**핵심**)", examples: [{ user: "작성자ID", text: "댓글 내용 요약(한국어)" }, ...] }
               - cons: { title: "반대측 주요 논리(**핵심**)", examples: [{ user: "작성자ID", text: "댓글 내용 요약(한국어)" }, ...] }
               - neutral: { title: "중립/기타 논리(**핵심**)", examples: [{ user: "작성자ID", text: "댓글 내용 요약(한국어)" }, ...] }

            5. psychology_analysis:
               - reason_for_enthusiasm: 열광 이유 (해방감, 정당성 부여 등). **핵심 단어 볼드체**.
               - reason_for_criticism: 비판 이유 (도덕적 분노, 현실성 등). **핵심 단어 볼드체**.

            6. insight_analysis: 성공/실패 요인 분석. **핵심 볼드체**.
            7. viewer_needs: 시청자 요구사항.
            8. sentiment_analysis: 감성 분석 상세.
            9. sentiment_pos_percent: 긍정 비율 (숫자 0~100).
            10. sentiment_neg_percent: 부정 비율 (숫자 0~100).
            
            11. best_comments_detailed: 댓글 5개를 선정하여 다음 객체 배열로 반환. (외국어 댓글이면 한국어로 요약 번역)
               - type: 댓글의 핵심 유형 (예: 핵심 주장, 사회 비판, 반론, 현실 모순, 공감 등).
               - text: 댓글 내용 (핵심 요약).
               - author: 작성자 ID.

            12. keywords_detailed: 주요 키워드를 "키워드 (맥락설명)" 형태로 5개 이상 배열.

            응답은 오직 JSON 객체로만 해줘.
            `;

            try {
                const result = await model.generateContent(prompt);
                return JSON.parse(result.response.text());
            } catch (e) {
                let msg = e.message;
                if (msg.includes('429') || msg.includes('quota') || msg.includes('403')) {
                    throw new Error("Gemini API 할당량을 초과했거나 권한이 없습니다.\nGemini API 키를 확인하거나 변경해주세요.");
                }
                throw new Error("Gemini API Error: " + msg);
            }
        }

            document.getElementById('channelControls').classList.add('hidden');
            document.getElementById('loadMoreContainer').classList.add('hidden');
            document.getElementById('resultArea').classList.add('hidden');

            try {
                channelVideosCache = [];
                nextPageToken = null;
                selectedVideoIds.clear();
                updateBatchButton();

                let cid = q;
                const parsedQ = parseChannelInput(q);

                if (!q.startsWith('UC')) {
                    const s = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${parsedQ}&type=channel&key=${k.ytKey}`).then(r => r.json());
                    if (!s.items?.length) throw new Error("채널을 찾을 수 없습니다.");

        window.loadMoreChannelVideos = async function () {
            const k = window.getKeys(); if (!k) return;
            if (!currentChannelId) return;

            const btn = document.querySelector('#loadMoreContainer button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="loader w-4 h-4 border-2 border-white/30 border-t-white inline-block mr-2"></div> 로딩 중...';
            btn.disabled = true;

            try {
                await window.fetchChannelVideosPage(k.ytKey);
            } catch (e) {
                alert("추가 영상을 불러오는데 실패했습니다.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        window.fetchChannelVideosPage = async function (apiKey) {
            const maxResults = 50;
            let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${currentChannelId}&order=date&maxResults=${maxResults}&type=video&key=${apiKey}`;
            if (nextPageToken) url += `&pageToken=${nextPageToken}`;

            const vRes = await fetch(url);
            const vData = await vRes.json();

            if (!vData.items?.length) {
                if (channelVideosCache.length === 0) document.getElementById('videoGrid').innerHTML = 'No Videos';
                document.getElementById('loadMoreContainer').classList.add('hidden');
                return;
            }

            nextPageToken = vData.nextPageToken || null;
            if (nextPageToken) document.getElementById('loadMoreContainer').classList.remove('hidden');
            else document.getElementById('loadMoreContainer').classList.add('hidden');

            const videoIds = vData.items.map(i => i.id.videoId).join(',');
            const dRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${videoIds}&key=${apiKey}`);
            const dData = await dRes.json();

            const newItems = dData.items.map(item => ({
                id: item.id,
                snippet: item.snippet,
                statistics: item.statistics,
                viewCount: parseInt(item.statistics.viewCount || 0),
                likeCount: parseInt(item.statistics.likeCount || 0),
                commentCount: parseInt(item.statistics.commentCount || 0),
                date: new Date(item.snippet.publishedAt)
            }));

            channelVideosCache = [...channelVideosCache, ...newItems];
            document.getElementById('channelControls').classList.remove('hidden');
            window.sortChannelVideos();
        }

        window.analyzeSelectedVideos = async function () {
            const k = window.getKeys(); if (!k) return;
            const ids = Array.from(selectedVideoIds);
            if (ids.length === 0) return;

            if (!confirm(`${ids.length}개의 영상을 순차적으로 분석하시겠습니까?\n시간이 다소 소요될 수 있으며 API 사용량이 증가합니다.`)) return;

            document.getElementById('resultArea').classList.add('hidden');

            const btn = document.getElementById('btnBatchAnalyze');
            btn.disabled = true;
            btn.classList.add('cursor-not-allowed', 'opacity-70');

            const zip = new JSZip();
            let successCount = 0;
            const batchDate = getFormattedDate(new Date());

            for (let i = 0; i < ids.length; i++) {
                const vid = ids[i];
                btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> 분석 중 (${i + 1}/${ids.length})...`;

                try {
                    const video = await window.fetchVideoDetails(vid, k.ytKey);
                    const comments = await window.fetchComments(vid, k.ytKey);

                    if (video && comments) {
                        await new Promise(r => setTimeout(r, 1500));
                        const analysis = await window.analyzeWithGemini(video, comments, k.geminiKey);
                        const ts = await window.saveAnalysis(vid, video, analysis);
                        const singleMd = window.generateMarkdown(analysis, video);

                        const filename = getReportFilename(video, ts);
                        zip.file(filename, singleMd);

                        successCount++;
                    }
                } catch (e) {
                    console.error(`Error analyzing ${vid}`, e);
                    zip.file(`Error_Log_${vid}.txt`, `Failed to analyze video ID ${vid}: ${e.message}`);
                }
            }

            const content = await zip.generateAsync({ type: "blob" });
            lastBatchZipBlob = content;
            lastBatchFilename = `Batch_Analysis_${ids.length}Videos_${batchDate}.zip`;

            triggerDownloadBlob(lastBatchZipBlob, lastBatchFilename);

            btn.innerHTML = `<i class="fas fa-file-download mr-1"></i> 분석 결과 다운로드 (ZIP)`;
            btn.classList.remove('bg-brand-blue', 'hover:bg-blue-600', 'opacity-70', 'cursor-not-allowed');
            btn.classList.add('bg-green-600', 'hover:bg-green-700');
            btn.disabled = false;
            btn.onclick = () => triggerDownloadBlob(lastBatchZipBlob, lastBatchFilename);

            alert(`${successCount}/${ids.length}개 영상 분석 완료. ZIP 파일이 다운로드되었습니다.`);
            selectedVideoIds.clear();
            window.renderChannelGrid();
        }

        window.fetchVideoDetails = async function (videoId, apiKey) {
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${videoId}&key=${apiKey}`);
                const data = await res.json();

                if (data.error) {
                    if (data.error.code === 403) {
                        throw new Error("YouTube API 할당량을 초과했거나 권한이 없습니다.\nYouTube API 키를 확인하거나 변경해주세요.");
                    }
                    throw new Error(data.error.message);
                }

                if (!data.items?.length) return null;
                return {
                    title: data.items[0].snippet.title,
                    channelTitle: data.items[0].snippet.channelTitle,
                    publishedAt: data.items[0].snippet.publishedAt,
                    viewCount: data.items[0].statistics.viewCount,
                    likeCount: data.items[0].statistics.likeCount,
                    commentCount: data.items[0].statistics.commentCount,
                    description: data.items[0].snippet.description
                };
            } catch (e) { throw e; }
        }

        window.fetchComments = async function (videoId, apiKey) {
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${videoId}&maxResults=100&order=relevance&key=${apiKey}`);
                const data = await res.json();

                if (data.error) {
                    if (data.error.code === 403) {
                        throw new Error("YouTube API 할당량을 초과했거나 권한이 없습니다.\nYouTube API 키를 확인하거나 변경해주세요.");
                    }
                    throw new Error(data.error.message);
                }

                return data.items ? data.items.map(i => `- ${i.snippet.topLevelComment.snippet.authorDisplayName}: ${i.snippet.topLevelComment.snippet.textDisplay.replace(/<br>/g, ' ')}`).join("\n") : null;
            } catch (e) { throw e; }
        }

        const extractVideoId = (url) => {
            // Added 'shorts/' to the regex
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|shorts\/)([^#&?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        function triggerDownload(content, filename) {
            const blob = new Blob([content], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function triggerDownloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
